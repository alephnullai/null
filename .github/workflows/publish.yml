name: publish

# Publish to PyPI via Trusted Publishing (OpenID Connect) — no API tokens.
# Fires when release.sh pushes a version tag to the public repo. The tag's
# commit is the orphan release snapshot, which already carries this workflow.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the PyPI Trusted Publisher config (environment: pypi).
    environment:
      name: pypi
      url: https://pypi.org/project/null-memory/
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify the wheel is installable and metadata is sane
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
